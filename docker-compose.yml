---
services:
  autoscaler:
    build: ./autoscaler
    container_name: gitlab-autoscaler
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - 986
    env_file: .env
    environment:
      - TZ=Asia/Omsk
    ports:
      - '8000:8000'  # Prometheus metrics
    dns:
      - 8.8.8.8
      - 1.1.1.1
    labels:
      - 'autoscaler=true'